send_anonymous_usage_stats: true
project_id: "tap-trentinopvgis"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-trentinopvgis"
    namespace: "tap_trentinopvgis"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: page_size
      kind: integer
      value: 2000
      description: Number of features per WFS GetFeature page

    - name: srs_name
      kind: string
      value: "EPSG:4326"
      description: Coordinate reference system for output geometries

    config:
      page_size: 2000
      srs_name: "EPSG:4326"

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
